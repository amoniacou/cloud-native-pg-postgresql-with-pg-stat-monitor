name: Create and publish a Docker image to ghcr.io

on:
  push:
    tags:
      - "*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: amoniacou/cloud-native-pg-postgresql-with-pg-stat-monitor

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        pg_version: ["16.8", "17.6"]
        deb_version: ["standard-trixie", "standard-bookworm"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/amoniacou/cloud-native-pg-postgresql-with-pg-stat-monitor
          tags: |
            type=raw,value=${{ matrix.pg_version }}-${{ matrix.deb_version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PG_VERSION=${{ matrix.pg_version }}
            DEB_VERSION=${{ matrix.deb_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  trivy-scan:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      matrix:
        pg_version: ["16.8", "17.6"]
        deb_version: ["standard-trixie", "standard-bookworm"]
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/amoniacou/cloud-native-pg-postgresql-with-pg-stat-monitor:${{ matrix.pg_version }}-${{ matrix.deb_version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

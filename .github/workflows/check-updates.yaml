name: Check for new CNPG PostgreSQL versions and build

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: amoniacou/cloud-native-pg-postgresql-with-pg-stat-monitor
  UPSTREAM_IMAGE: cloudnative-pg/postgresql
  PG_MAJORS: "16 17"

jobs:
  discover-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find-missing.outputs.matrix }}
      has_updates: ${{ steps.find-missing.outputs.has_updates }}
    steps:
      - name: Discover new upstream versions
        id: find-missing
        run: |
          set -euo pipefail

          # Get anonymous token for GHCR
          get_ghcr_token() {
            local image=$1
            curl -s "https://ghcr.io/token?scope=repository:${image}:pull" | jq -r '.token'
          }

          # List all tags for a GHCR image
          list_tags() {
            local image=$1
            local token=$2
            local url="https://ghcr.io/v2/${image}/tags/list"
            local all_tags=""

            while [ -n "$url" ]; do
              response=$(curl -s -D /tmp/headers -H "Authorization: Bearer ${token}" "$url")
              tags=$(echo "$response" | jq -r '.tags[]? // empty')
              all_tags="${all_tags}${tags}"$'\n'

              # Handle pagination via Link header
              url=$(grep -i '^link:' /tmp/headers 2>/dev/null \
                | sed -n 's/.*<\(.*\)>; *rel="next".*/\1/p' \
                | tr -d '\r' || true)
            done

            echo "$all_tags" | sort -u | grep -v '^$'
          }

          echo "Fetching upstream tags..."
          UPSTREAM_TOKEN=$(get_ghcr_token "${{ env.UPSTREAM_IMAGE }}")
          UPSTREAM_TAGS=$(list_tags "${{ env.UPSTREAM_IMAGE }}" "$UPSTREAM_TOKEN")

          echo "Fetching our tags..."
          OUR_TOKEN=$(get_ghcr_token "${{ env.IMAGE_NAME }}")
          OUR_TAGS=$(list_tags "${{ env.IMAGE_NAME }}" "$OUR_TOKEN" || echo "")

          # Filter upstream tags: match XX.Y-standard-variant (no date suffix)
          MATRIX_JSON="[]"
          for major in ${{ env.PG_MAJORS }}; do
            MATCHING=$(echo "$UPSTREAM_TAGS" \
              | grep -E "^${major}\.[0-9]+-standard-(trixie|bookworm)$" || true)

            while IFS= read -r tag; do
              [ -z "$tag" ] && continue

              # Check if we already have this tag
              if echo "$OUR_TAGS" | grep -qx "$tag"; then
                echo "Already exists: $tag"
                continue
              fi

              # Parse pg_version and deb_version
              pg_version=$(echo "$tag" | sed 's/-standard-.*//')
              deb_version=$(echo "$tag" | sed "s/^${pg_version}-//")

              echo "New version found: pg_version=$pg_version deb_version=$deb_version"
              MATRIX_JSON=$(echo "$MATRIX_JSON" | jq -c \
                --arg pv "$pg_version" --arg dv "$deb_version" \
                '. + [{"pg_version": $pv, "deb_version": $dv}]')
            done <<< "$MATCHING"
          done

          echo "Matrix: $MATRIX_JSON"
          COUNT=$(echo "$MATRIX_JSON" | jq 'length')

          if [ "$COUNT" -gt 0 ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

          echo "matrix={\"include\":$MATRIX_JSON}" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: discover-versions
    if: needs.discover-versions.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJson(needs.discover-versions.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.pg_version }}-${{ matrix.deb_version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PG_VERSION=${{ matrix.pg_version }}
            DEB_VERSION=${{ matrix.deb_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
